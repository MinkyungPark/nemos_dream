# Stage 1 — NeMo Data Designer (primary) + NIM fallback.
# Reference: ../nemo_dream_step1/configs/data_designer.yaml

model_configs:
  - alias: nemotron_super
    provider: nvidia
    model: nvidia/nemotron-3-super-120b-a12b
    base_url: https://integrate.api.nvidia.com/v1
    api_key_env: NVIDIA_API_KEY

columns:
  - name: dialogue
    type: seed
  - name: speakers
    type: seed
  - name: narrative
    type: seed

  - name: dialogue_decomposed
    type: llm_structured
    model_alias: nemotron_super
    output_format: nemos_dream.schemas.DialogueDecomposed
    temperature: 0.2
    system_prompt_ref: nemos_dream.stage1_decompose_map.prompts.SYSTEM_PROMPT
    prompt: |
      Annotate this multi-turn dialogue at the dialogue level (register,
      emotion, speech acts, cultural references). Speaker-level and
      scene-level decomposition happen in separate calls.

      Narrative: {{ narrative }}
      Speakers: {{ speakers }}
      Dialogue:
      {% for t in dialogue %}- {{ t }}
      {% endfor %}

fallback:
  enabled: true
  max_retries: 2
