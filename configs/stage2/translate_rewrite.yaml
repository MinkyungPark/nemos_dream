# Stage 2 — Korean translation + persona/style-conditioned rewrite config.

model:
  alias: nemotron_nano
  provider: nvidia
  model: nvidia/nemotron-3-nano-30b-a3b
  base_url: https://integrate.api.nvidia.com/v1
  api_key_env: NVIDIA_API_KEY
  temperature: 0.9

personas:
  dataset: nvidia/Nemotron-Personas-Korea
  split: train
  cache_dir: .cache/hf

targets:
  # Sampling distribution for translation_meta when the stage chooses a target
  # bucket rather than letting each speaker drift freely.
  platforms: [twitter, instagram, reddit, tiktok, thread]
  age_groups: [teen, 20s, 30s]
  gender_styles: [masc, fem, neutral]
